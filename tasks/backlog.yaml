- id: qwen-005
  title: "Implement Email adapter (SMTP outbound + IMAP inbound)"
  stream: qwen
  description: |
    Implement backend/core/messaging/adapters/email_adapter.py

    Class EmailAdapter(MessagingAdapter):
      __init__(self, channel: MessagingChannel, on_message_cb)
        channel.credentials keys:
          smtp_host, smtp_port, smtp_user, smtp_password,
          imap_host, imap_port, imap_user, imap_password,
          from_address, command_subject_prefix
        channel.targets: list of recipient email addresses.

      async start(self) -> None
        Begin background IMAP polling every 30 s.
        Match subjects starting with command_subject_prefix.
        Call on_message_cb(sender, subject, body) and reply with result.

      async stop(self) -> None

      async send_message(self, target: str, text: str) -> None
        Send via aiosmtplib. Subject "[Heimdall] Status Update".
        Wrap text in minimal HTML template.

