- id: qwen-006
  title: "Implement git integration helper"
  stream: qwen
  description: |
    Implement backend/core/git_integration.py

    Class GitManager:
      __init__(self, repo_path: str = ".")
        Open git.Repo at repo_path.

      get_status(self) -> dict
        Return {branch, clean, staged: list[str], unstaged: list[str]}

      commit_task_output(self, task_id: str, output_path: str, message: str) -> str
        Stage all files in output_path, commit, return commit sha.

      create_branch(self, name: str) -> None
      get_current_branch(self) -> str

      push(self, remote: str = "origin", branch: str | None = None) -> None
        Never force-push. Raise GitError if blocked.

      create_github_pr(self, title, body, head, base, token, repo) -> str
        Use PyGithub. Return PR URL.

      get_recent_commits(self, n: int = 10) -> list[dict]
        Return [{sha, message, author, date}]

    Export: class GitError(Exception)
    Use gitpython. No force-push allowed.

    Output: workspace/current/qwen-006/git_integration.py
